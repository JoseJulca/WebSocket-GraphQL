<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Arquitectura Demo 2 — GraphQL con Hot Chocolate</title>
<style>
  * { font-family: 'Segoe UI', Arial, sans-serif; }
  .label { fill: #1a1208; font-size: 13px; font-weight: 600; }
  .sub   { fill: #5a4a3a; font-size: 11px; }
  .arr-label { fill: #5a4a3a; font-size: 11px; }
  .sep   { stroke: #ccbcac; stroke-width: 0.5; stroke-dasharray: 4 4; }
  .code  { fill: #3a2a1a; font-size: 11px; font-family: 'Consolas', monospace; }
</style>
<rect width="680" height="520" fill="white"/>

<!-- BookStoreWebApp -->
<rect x="40" y="40" width="160" height="80" rx="8" fill="#e1f5ee" stroke="#1D9E75" stroke-width="0.8"/>
<text class="label" x="120" y="68" text-anchor="middle">BookStoreWebApp</text>
<text class="sub"   x="120" y="85" text-anchor="middle">Razor Pages + JS</text>
<text class="sub"   x="120" y="102" text-anchor="middle">puerto 5101</text>

<!-- BookStoreApi -->
<rect x="260" y="40" width="180" height="80" rx="8" fill="#faece7" stroke="#D85A30" stroke-width="0.8"/>
<text class="label" x="350" y="65" text-anchor="middle">BookStoreApi</text>
<text class="sub"   x="350" y="83" text-anchor="middle">Hot Chocolate 13</text>
<text class="sub"   x="350" y="101" text-anchor="middle">puerto 5100</text>

<!-- BookRepository -->
<rect x="500" y="40" width="150" height="80" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.8"/>
<text class="label" x="575" y="65" text-anchor="middle">BookRepository</text>
<text class="sub"   x="575" y="83" text-anchor="middle">In-Memory</text>
<text class="sub"   x="575" y="101" text-anchor="middle">5 libros semilla</text>

<defs>
  <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  </marker>
  <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5"/>
  </marker>
  <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5"/>
  </marker>
  <marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5"/>
  </marker>
  <marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5"/>
  </marker>
</defs>

<line x1="200" y1="70" x2="258" y2="70" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
<text class="arr-label" x="229" y="62" text-anchor="middle">HTTP POST</text>
<line x1="200" y1="96" x2="258" y2="96" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#a1)"/>
<text class="arr-label" x="229" y="112" text-anchor="middle">WebSocket (sub)</text>
<line x1="440" y1="80" x2="498" y2="80" stroke="#D85A30" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>

<!-- Nodos GraphQL -->
<rect x="260" y="162" width="76" height="44" rx="6" fill="#faeeda" stroke="#BA7517" stroke-width="0.5"/>
<text class="label" x="298" y="180" text-anchor="middle">Query</text>
<text class="sub"   x="298" y="196" text-anchor="middle">GetBooks</text>

<rect x="362" y="162" width="76" height="44" rx="6" fill="#eeedfe" stroke="#534AB7" stroke-width="0.5"/>
<text class="label" x="400" y="180" text-anchor="middle">Mutation</text>
<text class="sub"   x="400" y="196" text-anchor="middle">AddBook</text>

<rect x="464" y="162" width="86" height="44" rx="6" fill="#e1f5ee" stroke="#1D9E75" stroke-width="0.5"/>
<text class="label" x="507" y="180" text-anchor="middle">Subscription</text>
<text class="sub"   x="507" y="196" text-anchor="middle">OnBookAdded</text>

<line x1="350" y1="120" x2="298" y2="160" stroke="#D85A30" stroke-width="0.7" fill="none"/>
<line x1="350" y1="120" x2="400" y2="160" stroke="#D85A30" stroke-width="0.7" fill="none"/>
<line x1="350" y1="120" x2="507" y2="160" stroke="#D85A30" stroke-width="0.7" fill="none"/>

<!-- Separador -->
<line x1="40" y1="248" x2="640" y2="248" class="sep"/>
<text class="sub" x="340" y="240" text-anchor="middle">Ejemplos de operaciones GraphQL</text>

<!-- Query -->
<text class="label" x="60" y="272">Query — consultar con filtro</text>
<rect x="40" y="285" width="590" height="42" rx="6" fill="#fafaf8" stroke="#ccbcac" stroke-width="0.5"/>
<text class="code" x="54" y="301">query {</text>
<text class="code" x="54" y="317">  books(where: { genre: { eq: "Programación" } }) { id title author price inStock }</text>

<!-- Mutation -->
<text class="label" x="60" y="352">Mutation — agregar libro</text>
<rect x="40" y="365" width="590" height="42" rx="6" fill="#fafaf8" stroke="#ccbcac" stroke-width="0.5"/>
<text class="code" x="54" y="381">mutation {</text>
<text class="code" x="54" y="397">  addBook(input: { title: "...", author: "...", price: 49.9, year: 2024 }) { id }</text>

<!-- Subscription -->
<text class="label" x="60" y="432">Subscription — tiempo real vía WebSocket</text>
<rect x="40" y="445" width="590" height="42" rx="6" fill="#fafaf8" stroke="#ccbcac" stroke-width="0.5"/>
<text class="code" x="54" y="461">subscription {</text>
<text class="code" x="54" y="477">  onBookAdded { id title author }    ← se dispara automáticamente al hacer AddBook</text>
</svg>
